<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stretchy — A Social Movement</title>
  <meta name="description" content="Community movement classes where the price drops as more people join. Yoga, pilates, HIIT, breathwork, run clubs across Auckland.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; padding: 0; background: #F5EDE3; font-family: 'Space Grotesk', system-ui, sans-serif; color: #1A1A1A; }
    a { color: inherit; }

    @keyframes sBreath { 0%,100% { filter: none; } 50% { filter: drop-shadow(0 0 8px rgba(255,209,102,0.15)); } }
    @keyframes menuSlideUp { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes menuFadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* range slider thumb */
    .stretchy-range::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 26px; height: 26px; border-radius: 999px;
      background: #F5EDE3; border: 3px solid #1A1A1A; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .stretchy-range::-moz-range-thumb {
      width: 26px; height: 26px; border-radius: 999px;
      background: #F5EDE3; border: 3px solid #1A1A1A; cursor: pointer;
    }

    /* responsive */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr !important; }
      .hero-phones { height: 480px !important; margin-top: 20px; }
      .mechanic-grid { grid-template-columns: 1fr !important; }
      .explore-grid { grid-template-columns: 1fr !important; }
      .explore-grid > div:last-child { order: -1; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#7A8330">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#7A8330"/>
      <text x="600" y="430" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="92" fill="#F5EDE3" letter-spacing="-3">STRETCHY</text>
      <text x="600" y="500" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="30" fill="#FFD166">Move together. Pay less together.</text>
    </svg>
  </template>

  <div id="root"></div>

  <!-- S-mark + wordmark vector data (inlined to avoid an extra fetch) -->
  <script src="s-mark-svg.js"></script>
  <!-- Modular source of truth: edit these files directly. -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-attendee.jsx"></script>
  <script type="text/babel" src="screens-host.jsx"></script>
  <script type="text/babel" src="screens-admin.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<Landing />);
  </script>
</body>
</html>
